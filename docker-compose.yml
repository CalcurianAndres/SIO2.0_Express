version: "3.9"
services:
  # ─── Backend (Express + Socket.io) ───
  siob:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://Sio:SIO2023@DBMongo:27017/SIO?authSource=admin
      - PORT_URI=3000
    depends_on:
      - DBMongo

  # ─── Base de datos ───
  DBMongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=Sio
      - MONGO_INITDB_ROOT_PASSWORD=SIO2023
    volumes:
      - mongo-data:/data/db

  # ─── Frontend (Angular / nginx) ───
  # Descomentar para servir SIOF en contenedor separado.
  # Requiere build previo de SIOF (ver setup.sh).
  # Si solo se necesita backend + DB, comentar esta seccion.
  # siof:
  #   build: ../SIOF
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - siob

volumes:
  mongo-data:
